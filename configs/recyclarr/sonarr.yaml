sonarr:
  unlimited_sonarr:
    base_url: http://unlimited_sonarr:8989
    api_key: arr_api_key
            
    delete_old_custom_formats: true

    # Media Naming Configuration
    media_naming:
      series: plex-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    # Include Configuration
    include:
      - config: sonarr_custom_formats.yaml
      - config: sonarr_quality.yaml
